services:
  pyserver:
    build:
      context: ./pyserver
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-mock}
      PYSERVER_CACHE_DB: /app/cache-data/cache.db
    volumes:
      - pyserver-cache:/app/cache-data

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-opencode-go}
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY:-mock}
      OPENCODE_GO_BASE_URL: ${OPENCODE_GO_BASE_URL:-https://opencode.ai/zen/go/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-pro}
      LLM_MODEL_BACKTEST: ${LLM_MODEL_BACKTEST:-deepseek-v4-flash}
      LLM_SCORE_BATCH_SIZE: ${LLM_SCORE_BATCH_SIZE:-10}
      SIGNALS_LLM_TIMEOUT_MS: ${SIGNALS_LLM_TIMEOUT_MS:-900000}
      SIGNALS_LOAD_CONCURRENCY: ${SIGNALS_LOAD_CONCURRENCY:-3}
      SIGNALS_PYSERVER_TIMEOUT_MS: ${SIGNALS_PYSERVER_TIMEOUT_MS:-120000}
      BACKTEST_SIGNAL_CONCURRENCY: ${BACKTEST_SIGNAL_CONCURRENCY:-8}
      BACKTEST_LLM_SCORE_BATCH_SIZE: ${BACKTEST_LLM_SCORE_BATCH_SIZE:-10}
      BACKTEST_LLM_TIMEOUT_MS: ${BACKTEST_LLM_TIMEOUT_MS:-300000}
      BACKTEST_LLM_MAX_ATTEMPTS: ${BACKTEST_LLM_MAX_ATTEMPTS:-2}
      BACKTEST_LOAD_CONCURRENCY: ${BACKTEST_LOAD_CONCURRENCY:-10}
      BACKTEST_PYSERVER_TIMEOUT_MS: ${BACKTEST_PYSERVER_TIMEOUT_MS:-60000}
      UNIVERSE_REFRESH_LLM_TIMEOUT_MS: ${UNIVERSE_REFRESH_LLM_TIMEOUT_MS:-900000}
      UNIVERSE_REFRESH_VALIDATE_TIMEOUT_MS: ${UNIVERSE_REFRESH_VALIDATE_TIMEOUT_MS:-20000}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      PYSERVER_URL: http://pyserver:8001
    depends_on:
      - pyserver

volumes:
  pyserver-cache:
